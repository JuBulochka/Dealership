<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELARO - Админ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
  <main class="site">
    <header class="panel header">
      <div class="header-row">
        <a class="logo" href="index.html">VELARO</a>
        <div class="cart-pill">Корзина: <strong data-cart-count>0</strong></div>
        <button class="menu-btn" type="button" data-menu-toggle>≡</button>
      </div>
      <nav class="nav" data-main-nav>
        <a class="nav-link" href="catalog.html">Каталог</a>
        <a class="nav-link" href="cart.html">Корзина</a>
        <a class="nav-link" href="register.html">Регистрация</a>
        <a class="nav-link" href="profile.html">Личный кабинет</a>
        <a class="nav-link active" href="admin.html">Админ</a>
      </nav>
    </header>

    <section class="panel section">
      <h1 class="section-title">Админ панель</h1>
      <form class="simple-form" data-admin-form>
        <input type="hidden" name="id" />
        <input type="text" name="brand" placeholder="Марка" />
        <input type="text" name="model" placeholder="Модель" />
        <input type="number" name="year" placeholder="Год" />
        <input type="number" name="mileage" placeholder="Пробег" />
        <input type="number" name="price" placeholder="Цена" />
        <button class="btn btn-primary" type="submit">Сохранить</button>
        <button class="btn btn-outline" type="button" data-admin-reset>Сбросить форму</button>
      </form>
    </section>

    <section class="panel section">
      <h2 class="section-title">Список автомобилей</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Марка</th>
              <th>Модель</th>
              <th>Год</th>
              <th>Пробег</th>
              <th>Цена</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody data-admin-body></tbody>
        </table>
      </div>
    </section>

        <footer class="m-footer m-card">
      <a class="logo" href="index.html">VELARO</a>
      <div class="m-footer-grid">
        <div>
          <h5>Навигация</h5>
          <a href="index.html">Главная</a>
          <a href="catalog.html">Каталог</a>
          <a href="cart.html">Корзина</a>
        </div>
        <div>
          <h5>Сайт</h5>
          <a href="register.html">Регистрация</a>
          <a href="profile.html">Личный кабинет</a>
          <a href="admin.html">Админ</a>
        </div>
      </div>
      <p>© 2026 VELARO. Все права защищены.</p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
